<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinelzflix | Watch Now</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav id="navbar">
        <div class="logo">
            <img src="logo.png" alt="Sinelzflix Logo">
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search movies, anime..." oninput="handleSearch(this.value)">
        </div>
    </nav>

    <main>
        <section id="search-results-section" style="display: none; padding-top: 100px;">
            <h2 id="search-title">Search Results</h2>
            <div id="search-results-list" class="movie-row"></div>
            <hr style="border: 1px solid var(--primary-blue); opacity: 0.2; margin: 40px 0;">
        </section>

        <div id="trending-section">
            <header id="banner">
                <div id="banner-content">
                    <h1 id="banner-title">Loading...</h1>
                    <p id="banner-desc"></p>
                </div>
            </header>

            <section>
                <h2>Trending Movies</h2>
                <div id="movies-list" class="movie-row"></div>
            </section>

            <section>
                <h2>TV Shows</h2>
                <div id="tvshows-list" class="movie-row"></div>
            </section>

            <section>
                <h2>Anime World</h2>
                <div id="anime-list" class="movie-row"></div>
            </section>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="player-container">
                <iframe id="modal-video" allowfullscreen></iframe>
            </div>
            <div class="modal-details">
                <div class="modal-info">
                    <img id="modal-image" src="" alt="">
                    <div>
                        <h2 id="modal-title"></h2>
                        <div id="modal-rating"></div>
                        <p id="modal-description"></p>
                        <select id="server" onchange="changeServer()">
                            <option value="vidsrc">Server 1 (VidSrc)</option>
                            <option value="vidsrc2">Server 2 (Net)</option>
                            <option value="videasy">Server 3 (Easy)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
