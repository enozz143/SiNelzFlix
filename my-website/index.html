<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiNelzFlix Free HDmovie Streaming</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1 class="logo">SiNelzFlix</h1>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Search movies, anime..." oninput="handleSearch(this.value)">
    <div id="suggestions-box" class="suggestions"></div>
</div>

</header>


<section id="banner">

<div class="banner-content">

<h2 id="banner-title"></h2>

<p id="banner-desc"></p>

</div>

</section>


<section class="row">

<h2>Trending Movies</h2>

<div id="movies-list" class="movie-row"></div>

</section>


<section class="row">

<h2>Trending TV Shows</h2>

<div id="tvshows-list" class="movie-row"></div>

</section>


<section class="row">

<h2>Trending Anime</h2>

<div id="anime-list" class="movie-row"></div>

</section>


<div id="modal">

<div class="modal-content">

<span onclick="closeModal()" class="close">X</span>

<img id="modal-image" class="modal-poster">

<h2 id="modal-title"></h2>

<p id="modal-description"></p>

<div id="modal-rating"></div>


<select id="server" onchange="changeServer()">

<option value="vidsrc">Server 1</option>
<option value="vidsrc2">Server 2</option>
<option value="videasy">Server 3</option>

</select>


<iframe
id="modal-video"
allowfullscreen
></iframe>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
