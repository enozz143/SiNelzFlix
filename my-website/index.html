<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINElzFlix | Unlimited Cinema Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- GENRE & LOAD MORE STYLES --- */
        .genre-container {
            padding: 20px 4%;
            text-align: center;
            overflow-x: auto;
            white-space: nowrap;
            margin-top: 20px;
        }
        .genre-btn {
            padding: 8px 20px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        .genre-btn:hover, .genre-btn.active {
            background: #e50914;
            border-color: #e50914;
            transform: translateY(-2px);
        }
        .load-more-container {
            text-align: center;
            margin: 40px 0;
        }
        #load-more-btn {
            padding: 12px 35px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Poppins', sans-serif;
            transition: transform 0.2s, background 0.2s;
        }
        #load-more-btn:hover {
            background: #ff0a16;
            transform: scale(1.05);
        }
        #load-more-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo">
            <img src="logo.png" alt="CINElzFlix Logo" id="site-logo">
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search movies, anime..." oninput="handleSearch(this.value)">
        </div>
    </nav>
    
    <main>
        <section id="search-results-section" style="display: none; padding-top: 100px;">
            <h2 id="search-title">Search Results</h2>
            <div id="search-results-list" class="movie-row"></div>
            <hr style="border: 1px solid #e50914; opacity: 0.2; margin: 40px 0;">
        </section>

        <div id="trending-section">
            <header id="banner">
                <div id="banner-content">
                    <h1 id="banner-title">Loading...</h1>
                    <p id="banner-desc"></p>
                </div>
            </header>

            <div class="genre-container">
                <button class="genre-btn active" onclick="filterGenre('all')">All</button>
                <button class="genre-btn" onclick="filterGenre(28)">Action</button>
                <button class="genre-btn" onclick="filterGenre(35)">Comedy</button>
                <button class="genre-btn" onclick="filterGenre(27)">Horror</button>
                <button class="genre-btn" onclick="filterGenre(10749)">Romance</button>
                <button class="genre-btn" onclick="filterGenre(878)">Sci-Fi</button>
            </div>

            <section>
                <h2>Trending Movies</h2>
                <div id="movies-list" class="movie-row"></div>
                
                <div class="load-more-container">
                    <button id="load-more-btn" onclick="loadMore()">Load More Movies</button>
                </div>
            </section>

            <section>
                <h2>TV Shows</h2>
                <div id="tvshows-list" class="movie-row"></div>
            </section>

            <section>
                <h2>Anime World</h2>
                <div id="anime-list" class="movie-row"></div>
            </section>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="player-container">
                <iframe id="modal-video" allowfullscreen></iframe>
            </div>
            <div class="modal-details">
                <div class="modal-info">
                    <img id="modal-image" src="" alt="">
                    <div>
                        <h2 id="modal-title"></h2>
                        <div id="modal-rating"></div>
                        <p id="modal-description"></p>
                        <select id="server" onchange="changeServer()">
                            <option value="vidsrc">Server 1 (VidSrc)</option>
                            <option value="vidsrc2">Server 2 (Net)</option>
                            <option value="videasy">Server 3 (Easy)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
