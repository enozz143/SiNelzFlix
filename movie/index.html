<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Now - CINElzFlix</title>
    <link rel="stylesheet" href="../style.css?v=1.6">
    <link rel="stylesheet" href="../css/hero.css"> 
    <link rel="stylesheet" href="movie-style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <section id="movie-hero">
        <div class="movie-overlay"></div>
        
        <div class="hero-info-content">
            <h1 id="movie-title">Loading Title...</h1>
            <div id="movie-meta-hero" class="meta-info"></div>
            <p id="movie-description-hero">Fetching cinematic details...</p>
            
            <div class="hero-actions">
                <button id="scroll-to-player" class="watch-now">▶ WATCH FULL MOVIE</button>
                <button id="play-trailer-btn" class="btn-secondary">🎬 WATCH TRAILER</button>
            </div>
        </div>
    </section>

    <main class="movie-page-container" id="player-section">
        <div class="controls-bar">
            <div class="back-link">
                <a href="/" class="back-btn">← Back to Home</a>
            </div>
            <div class="server-box">
                <label for="server-select">Switch Server: </label>
                <select id="server-select">
                    <option value="vidsrc">Server 1 (VidSrc)</option>
                    <option value="vidsrc2">Server 2 (Net)</option>
                    <option value="videasy">Server 3 (Easy)</option>
                </select>
            </div>
        </div>

        <div class="player-wrapper">
            <iframe id="movie-iframe" src="" allowfullscreen></iframe>
        </div>

        <div class="movie-info-grid">
            <div class="poster-side">
                <img id="movie-poster" src="" alt="Poster">
                <div class="rating-badge" id="vote-avg">0.0</div>
            </div>
            <div class="details-side">
                <h2>The Story</h2>
                <p id="movie-overview">Loading overview...</p>
                
                <div class="cast-section">
                    <h3>Top Cast</h3>
                    <div id="movie-cast" class="cast-list">
                        </div>
                </div>
            </div>
        </div>

        <section class="similar-section">
            <h2 style="margin-bottom: 20px;">You Might Also Like</h2>
            <div id="similar-movies-container">
                </div>
        </section>
    </main>

    <footer>
        <p>© 2026 CINElzFlix.com • Developed by Nelz</p>
    </footer>

    <script type="module" src="../js/movie-page.js"></script>
</body>
</html>
