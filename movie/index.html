<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Now - CINElzFlix</title>
    <link rel="stylesheet" href="../style.css?v=1.6">
    <link rel="stylesheet" href="../css/hero.css"> 
    <link rel="stylesheet" href="movie-style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Additional styles for loading indicators */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .player-wrapper {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        #movie-iframe {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            border: none;
        }
        
        #player-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        #global-loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background: rgba(0,0,0,0.9);
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        /* Adjust hero section to account for fixed navbar */
        #movie-hero {
            margin-top: 85px; /* Same height as navbar */
        }
        
        @media (max-width: 768px) {
            #movie-iframe {
                height: 50vh;
                min-height: 300px;
            }
            
            #movie-hero {
                margin-top: 70px;
            }
        }
    </style>
</head>
<body>
    
    <!-- ========== NAVBAR (SAME AS ROOT) ========== -->
    <nav id="navbar">
        <div class="logo">
            <a href="/" style="text-decoration: none;">
                <img src="../logo.png" alt="CINElzFlix Logo" id="site-logo">
            </a>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search movies, anime..." oninput="handleSearch(this.value)">
        </div>
    </nav>
    <!-- ========== END NAVBAR ========== -->
    
    <section id="movie-hero">
        <div class="movie-overlay"></div>
        
        <div class="hero-info-content">
            <h1 id="movie-title">Loading Title...</h1>
            <div id="movie-meta-hero" class="meta-info"></div>
            <p id="movie-description-hero">Fetching cinematic details...</p>
            
            <div class="hero-actions">
                <button id="scroll-to-player" class="watch-now">▶ WATCH FULL MOVIE</button>
                <button id="play-trailer-btn" class="btn-secondary">🎬 WATCH TRAILER</button>
            </div>
        </div>
    </section>

    <main class="movie-page-container" id="player-section">
        <div class="controls-bar">
            <div class="back-link">
                <a href="/" class="back-btn">← Back to Home</a>
            </div>
            <div class="server-box">
                <label for="server-select">Switch Server: </label>
                <select id="server-select">
                    <option value="vidsrc">Server 1 (VidSrc)</option>
                    <option value="vidsrc2">Server 2 (Net)</option>
                    <option value="videasy">Server 3 (Easy)</option>
                </select>
            </div>
        </div>

        <div class="player-wrapper">
            <iframe id="movie-iframe" src="" allowfullscreen></iframe>
            <div id="player-loading" style="display: none;">
                <div style="width: 40px; height: 40px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div>
                <p style="color: #00d4ff; margin-top: 10px;">Loading player...</p>
            </div>
        </div>

        <div class="movie-info-grid">
            <div class="poster-side">
                <img id="movie-poster" src="" alt="Poster">
                <div class="rating-badge" id="vote-avg">0.0</div>
            </div>
            <div class="details-side">
                <h2>The Story</h2>
                <p id="movie-overview">Loading overview...</p>
                
                <div class="cast-section">
                    <h3>Top Cast</h3>
                    <div id="movie-cast" class="cast-list">
                        <!-- Cast will be loaded here -->
                    </div>
                </div>
            </div>
        </div>

        <section class="similar-section">
            <h2 style="margin-bottom: 20px;">You Might Also Like</h2>
            <div id="similar-movies-container">
                <!-- Similar movies will be loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 CINElzFlix.com • Developed by Nelz</p>
    </footer>

    <!-- Global loading spinner (hidden by default) -->
    <div id="global-loading" style="display: none;">
        <div style="width: 50px; height: 50px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div>
        <p style="color: #00d4ff; margin-top: 10px;">Loading movie data...</p>
    </div>

    <!-- Search functionality -->
    <script type="module">
        import { handleSearch } from '../js/ui.js';
        window.handleSearch = handleSearch;
    </script>
    
    <script src="../js/movie-page.js"></script>
</body>
</html>
