<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Now - CINElzFlix</title>
    <link rel="stylesheet" href="../style.css?v=1.6">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #00d4ff; }
        body { background-color: #0a0a0a; font-family: 'Poppins', sans-serif; margin: 0; }
        
        .movie-page-container { padding-top: 100px; max-width: 1200px; margin: 0 auto; padding-inline: 20px; color: white; padding-bottom: 50px; }
        
        /* Player Styling */
        .player-wrapper { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }
        #movie-iframe { width: 100%; height: 100%; border: none; }

        /* Controls */
        .controls-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            gap: 15px;
            flex-wrap: wrap;
        }
        .back-btn { 
            text-decoration: none; 
            color: white; 
            background: rgba(255,255,255,0.1); 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary-blue); }

        #server-select { 
            padding: 10px 20px; 
            border-radius: 5px; 
            background: #1a1a1a; 
            color: white; 
            border: 1px solid var(--primary-blue);
            cursor: pointer;
        }

        /* Info Section */
        .movie-info-grid { display: grid; grid-template-columns: 280px 1fr; gap: 40px; margin-top: 30px; }
        #movie-poster { 
            width: 100%; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .details-side h1 { color: var(--primary-blue); font-size: 2.2rem; margin: 0; line-height: 1.2; }
        .meta-info { margin: 15px 0; color: #00d4ff; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }
        #movie-overview { line-height: 1.7; font-size: 1rem; color: #ccc; margin-bottom: 20px; }
        
        .similar-section { margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }

        @media (max-width: 768px) { 
            .movie-info-grid { grid-template-columns: 1fr; text-align: center; } 
            #movie-poster { max-width: 220px; margin: 0 auto; }
            .details-side h1 { font-size: 1.8rem; }
            .controls-bar { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo">
            <a href="/"><img src="../logo.png" alt="CINElzFlix" id="site-logo"></a>
        </div>
    </nav>

    <main class="movie-page-container">
        <div class="controls-bar">
            <a href="/" class="back-btn">← Back to Home</a>
            <select id="server-select">
                <option value="vidsrc">Server 1 (VidSrc)</option>
                <option value="vidsrc2">Server 2 (Net)</option>
                <option value="videasy">Server 3 (Easy)</option>
            </select>
        </div>

        <div class="player-wrapper">
            <iframe id="movie-iframe" src="" allowfullscreen></iframe>
        </div>

        <div id="player-bottom-ad" style="text-align: center; margin: 20px 0;">
            </div>

        <div class="movie-info-grid">
            <div class="poster-side">
                <img id="movie-poster" src="https://via.placeholder.com/300x450?text=Loading..." alt="Poster">
            </div>
            <div class="details-side">
                <h1 id="movie-title">Loading Title...</h1>
                <div id="movie-meta" class="meta-info"></div>
                <p id="movie-overview">Fetching movie details, please wait a moment, bro...</p>
                <div id="movie-cast" style="margin-top: 20px; font-size: 0.9rem; color: #888;"></div>
            </div>
        </div>

        <section class="similar-section">
            <div id="similar-movies-container">
                </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 40px; color: #444; font-size: 0.8rem; border-top: 1px solid #111;">
        <p>© 2026 CINElzFlix.com • Developed by Nelz</p>
    </footer>

    <script type="module" src="../js/movie-page.js"></script>
</body>
</html>
