<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Movie - CINElzFlix</title>
    <link rel="stylesheet" href="style.css?v=1.6">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .movie-page-container { padding-top: 100px; max-width: 1200px; margin: 0 auto; padding-inline: 20px; color: white; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 30px; border: 1px solid var(--primary-blue); }
        #movie-iframe { width: 100%; height: 100%; border: none; }
        .movie-info-grid { display: grid; grid-template-columns: 300px 1fr; gap: 30px; margin-top: 20px; }
        #movie-poster { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @media (max-width: 768px) { .movie-info-grid { grid-template-columns: 1fr; } #movie-poster { max-width: 200px; margin: 0 auto; } }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo"><a href="/"><img src="logo.png" alt="CINElzFlix" id="site-logo"></a></div>
    </nav>

    <main class="movie-page-container">
        <div class="player-wrapper">
            <iframe id="movie-iframe" allowfullscreen></iframe>
        </div>

        <div class="server-selection" style="margin-bottom: 20px;">
            <select id="server-select" style="padding: 10px; border-radius: 5px; background: #1a1a1a; color: white; border: 1px solid var(--primary-blue);">
                <option value="vidsrc">Server 1 (VidSrc)</option>
                <option value="vidsrc2">Server 2 (Net)</option>
            </select>
        </div>

        <div class="movie-info-grid">
            <div class="poster-side"><img id="movie-poster" src="" alt="Poster"></div>
            <div class="details-side">
                <h1 id="movie-title" style="color: var(--primary-blue); font-size: 2.5rem; margin: 0;">Loading...</h1>
                <div id="movie-meta" style="margin: 10px 0; color: #ccc;"></div>
                <p id="movie-overview" style="line-height: 1.6; font-size: 1.1rem;"></p>
                <div id="movie-cast" style="margin-top: 20px; font-style: italic; color: #888;"></div>
            </div>
        </div>
    </main>

    <script type="module" src="js/movie-page.js"></script>
</body>
</html>
