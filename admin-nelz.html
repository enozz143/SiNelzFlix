<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINElzFlix | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 100px 20px; text-align: center; color: white; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; margin: 10px; }
        button { padding: 10px 20px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .preview-box { margin-top: 30px; border: 2px dashed #444; padding: 20px; min-height: 300px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>🎥 Movie Tester Panel</h1>
        <p>Gamitin 'to para i-test kung working ang movie/anime bago i-post.</p>
        
        <input type="text" id="test-id" placeholder="Enter TMDB ID (ex: 550)">
        <select id="test-type">
            <option value="movie">Movie</option>
            <option value="tv">TV Show</option>
        </select>
        <button onclick="testPlayer()">Test Playback</button>

        <div class="preview-box">
            <h3 id="status">Preview Player</h3>
            <iframe id="test-iframe" width="100%" height="400px" allowfullscreen style="display:none; border:none; border-radius: 10px; box-shadow: 0 0 20px rgba(0,212,255,0.2);"></iframe>
        </div>
    </div>

    <script>
        function testPlayer() {
            const id = document.getElementById('test-id').value;
            const type = document.getElementById('test-type').value;
            const iframe = document.getElementById('test-iframe');
            const status = document.getElementById('status');

            if(!id) { alert("Lagay ka ng ID bro!"); return; }

            // VidSrc Test
            const url = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
            iframe.src = url;
            iframe.style.display = "block";
            status.innerText = "Playing ID: " + id;
        }
    </script>
</body>
</html>
