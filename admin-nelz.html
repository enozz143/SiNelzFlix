<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINElzFlix | Private Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #000; font-family: 'Poppins', sans-serif; display: none; } /* Hidden by default */
        .admin-container { padding: 80px 20px; text-align: center; color: white; max-width: 800px; margin: auto; }
        .input-group { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        input, select { padding: 12px; width: 200px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; margin: 10px; }
        button { padding: 12px 25px; background: #00d4ff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: black; transition: 0.3s; }
        button:hover { background: #0088cc; transform: scale(1.05); }
        .preview-box { margin-top: 30px; border: 2px dashed #00d4ff; padding: 10px; min-height: 400px; border-radius: 15px; background: #050505; }
        iframe { width: 100%; height: 400px; border: none; border-radius: 10px; display: none; }
        .logout-btn { margin-top: 20px; font-size: 0.8rem; color: #ff4d4d; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 style="color: #00d4ff;">🎬 Nelz Private Panel</h1>
        <p>Test your TMDB IDs and Player Servers securely.</p>
        
        <div class="input-group">
            <input type="text" id="test-id" placeholder="TMDB ID (e.g. 550)">
            <select id="test-type">
                <option value="movie">Movie</option>
                <option value="tv">TV Show</option>
            </select>
            <button onclick="testPlayer()">Run Movie Test</button>
        </div>

        <div class="preview-box">
            <h3 id="status" style="margin-top: 150px; color: #444;">No Movie Loaded</h3>
            <iframe id="test-iframe" allowfullscreen></iframe>
        </div>

        <p class="logout-btn" onclick="location.reload()">Lock Panel</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const MY_PASSWORD = "NELZ_PRIVATE_2026"; // Palitan mo 'to bro ng sarili mong password!

        // --- AUTHENTICATION ---
        function checkAccess() {
            const pass = prompt("Bro, anong password natin? 🗝️");
            if (pass === MY_PASSWORD) {
                document.body.style.display = "block"; // Show page
                alert("Welcome back, Nelz! Access Granted.");
            } else {
                alert("Wrong password, bro. Balik ka na sa site!");
                window.location.href = "index.html"; // Kick them out
            }
        }

        // Run security check on load
        checkAccess();

        // --- TESTER LOGIC ---
        function testPlayer() {
            const id = document.getElementById('test-id').value;
            const type = document.getElementById('test-type').value;
            const iframe = document.getElementById('test-iframe');
            const status = document.getElementById('status');

            if(!id) { alert("Wala kang nilagay na ID, bro!"); return; }

            const url = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
            iframe.src = url;
            iframe.style.display = "block";
            status.style.display = "none";
        }
    </script>
</body>
</html>
